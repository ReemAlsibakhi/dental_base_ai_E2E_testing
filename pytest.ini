[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
markers =
    smoke: Core happy-path tests — run on every deploy
    regression: Full regression suite
    negative: Validation / error-path tests
    boundary: Boundary-value tests
    security: RBAC and session tests
    usability: UX / error-recovery tests
    functional: Positive functional tests
