            const fs = require('fs');
            if (fs.existsSync('reports/bug_report.md')) {
              github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `🐛 Module 4 Failures — Run #${context.runNumber}`,
                body: fs.readFileSync('reports/bug_report.md', 'utf8'),
                labels: ['bug', 'automation', 'module-4']
