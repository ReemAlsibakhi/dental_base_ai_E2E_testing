name: E2E Tests — DentalBase Settings

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  BASE_URL:       ${{ secrets.BASE_URL }}
  ADMIN_EMAIL:    ${{ secrets.ADMIN_EMAIL }}
  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
  HEADLESS:       true
  SLOW_MO:        0

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run smoke tests
        run: |
          mkdir -p reports
          pytest -m smoke -v \
            --html=reports/smoke_report.html \
            --self-contained-html

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_number }}
          path: reports/
          retention-days: 7

  regression_module1:
    name: Regression — Module 1 (Profile)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run Module 1 tests
        run: |
          mkdir -p reports
          pytest tests/profile/ -v \
            --html=reports/module1_report.html \
            --self-contained-html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module1-report-${{ github.run_number }}
          path: reports/
          retention-days: 30

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'reports/bug_report.md';
            if (fs.existsSync(path)) {
              const body = fs.readFileSync(path, 'utf8');
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🐛 Module 1 Failures — Run #${context.runNumber}`,
                body: body,
                labels: ['bug', 'automation', 'module-1']
              });
            }

  regression_module2:
    name: Regression — Module 2 (Practice Profile & Hours)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run Module 2 tests
        run: |
          mkdir -p reports
          pytest tests/practice_profile/ -v \
            --html=reports/module2_report.html \
            --self-contained-html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module2-report-${{ github.run_number }}
          path: reports/
          retention-days: 30

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'reports/bug_report.md';
            if (fs.existsSync(path)) {
              const body = fs.readFileSync(path, 'utf8');
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🐛 Module 2 Failures — Run #${context.runNumber}`,
                body: body,
                labels: ['bug', 'automation', 'module-2']
              });
            }
